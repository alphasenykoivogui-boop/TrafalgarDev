<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DEVTRAFALGAR.com</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:350px;
padding:20px;
background:black;
border-radius:30px;
border:2px solid blue;
box-shadow:0 0 15px blue,0 0 40px blue;
text-align:center;
}

.top img{
width:100%;
height:180px;
object-fit:cover;
border-radius:20px;
border:2px solid blue;
box-shadow:0 0 15px blue,0 0 30px blue;
}

h1{
margin-top:20px;
color:blue;
text-shadow:0 0 20px blue;
}

.sub{
margin-top:10px;
font-size:13px;
letter-spacing:4px;
color:#ddd;
}

.input-box{
display:flex;
align-items:center;
margin-top:25px;
padding:0 15px;
border:2px solid blue;
border-radius:15px;
}

.input-box input{
border:none;
background:transparent;
width:100%;
height:55px;
color:white;
font-size:18px;
outline:none;
}

.buttons{
display:flex;
gap:10px;
margin-top:25px;
}

.box{
flex:1;
padding:15px;
border:2px solid blue;
border-radius:15px;
color:blue;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px blue;
}

.send{
margin-top:30px;
width:100%;
padding:18px;
border:none;
border-radius:30px;
background:blue;
color:white;
font-size:20px;
font-weight:bold;
}

.footer{
margin-top:15px;
font-size:12px;
color:gray;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<img src="trafalgar.jpg">
</div>

<h1>𝐓𝐑𝐀𝐅𝐀𝐋𝐆𝐀𝐑 𝐃. 𝐋𝐀𝐖</h1>

<div class="sub">
ACCOUNT • SUPPORT • REQUEST
</div>

<div class="input-box">
<span>📱</span>
<input id="numero" type="tel" placeholder="Entrer numéro">
</div>

<div class="buttons">

<div class="box" onclick="choisirTexte(1)">
📝 TEXT N°1
</div>

<div class="box" onclick="choisirTexte(2)">
📄 TEXT N°2
</div>

<div class="box" onclick="choisirTexte(3)">
📋 TEXT N°3
</div>

</div>

<button class="send" onclick="envoyer()">
ENVOYER 🚀
</button>

<div class="footer">
Premium Interface V1
</div>

</div>

<script>

let texteChoisi="";

function choisirTexte(n){

if(n===1){
texteChoisi="Bonjour,\n\nJe souhaite contacter le support.\n\nMerci.";
}

if(n===2){
texteChoisi="Bonjour,\n\nJe souhaite demander une vérification.\n\nMerci.";
}

if(n===3){
texteChoisi="Bonjour,\n\nJe souhaite obtenir une assistance.\n\nMerci.";
}

document.querySelector(".footer").innerHTML=
"✅ TEXT N°"+n+" sélectionné";

}

function envoyer(){

let numero =
document.getElementById("numero").value;

if(numero==""){
alert("Entre un numéro");
return;
}

if(texteChoisi==""){
alert("Choisis un texte");
return;
}

let email="support@support.whatsapp.com";

let sujet="Demande assistance";

let message=
texteChoisi+"\n\nNuméro : "+numero;

let gmail =
"https://mail.google.com/mail/?view=cm&fs=1" +
"&to=" + encodeURIComponent(email) +
"&su=" + encodeURIComponent(sujet) +
"&body=" + encodeURIComponent(message);

window.open(gmail, '_blank');

}

</script>

</body>
</html>
